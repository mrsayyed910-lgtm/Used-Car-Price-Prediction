<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Used Car Price Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<nav>

<h2>
<i class="fa-solid fa-car-side"></i>
Used Car Price Prediction
</h2>

<button id="themeButton">
🌙 Dark Mode
</button>

</nav>

<div class="container">

<div class="card">

<h1>🚗 Predict Used Car Price</h1>

<p>
Predict the market value of your car using Machine Learning
</p>

<form action="/predict" method="POST">

    <div class="input-box">

        <label>Brand</label>
        
        <select id="brand" name="brand" onchange="updateModels(); updateLogo();" required>
        
        <option value="">Select Brand</option>
        
        {% for brand in brands %}
        <option value="{{brand}}">{{brand}}</option>
        {% endfor %}
        
        </select>
        
        </div>
        
        <div class="logo-box">
        
        <img id="brandLogo"
        src="{{ url_for('static', filename='images/brands/default.png') }}"
        alt="Brand Logo">
        
        </div>

<div class="input-box">

    <label>Model</label>
    
    <select id="model" name="model" onchange="updateCarImage(); updateCarDetails();" required>
    
    <option value="">Select Model</option>
    
    </select>
    
    </div>
    
    <div class="car-image-box">
    
    <img id="carImage"
    src="{{ url_for('static', filename='images/cars/default.jpg') }}"
    alt="Car Image">
    
    </div>

    <div class="input-box">
        <label>Fuel Type</label>
    
        <select name="fuel_type" required>
            <option value="">Select Fuel Type</option>
    
            {% for fuel in fuel_types %}
            <option value="{{ fuel }}">{{ fuel }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="input-box">
        <label>Transmission Type</label>
    
        <select name="transmission_type" required>
            <option value="">Select Transmission</option>
    
            {% for transmission in transmissions %}
            <option value="{{ transmission }}">{{ transmission }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="input-box">
        <label>Seller Type</label>
    
        <select name="seller_type" required>
            <option value="">Select Seller Type</option>
    
            {% for seller in seller_types %}
            <option value="{{ seller }}">{{ seller }}</option>
            {% endfor %}
        </select>
    </div>
   
    <div class="input-box">

        <label>Registration Year</label>
    
        <input
            type="number"
            id="registration_year"
            name="registration_year"
            min="1990"
            max="2026"
            oninput="calculateVehicleAge()"
            required>
    
    </div>

    <div class="input-box">

        <label>Vehicle Age</label>
    
        <input
            type="number"
            id="vehicle_age"
            name="vehicle_age"
            readonly>
    
    </div>
    <div class="input-box">

        <label>Owner Type</label>
        
        <select name="owner_type" required>
        
        <option value="">Select Owner</option>
        
        {% for owner in owner_types %}
        <option value="{{ owner }}">{{ owner }}</option>
        {% endfor %}
        
        </select>
        
        </div>
        <div class="input-box">

            <label>Car Condition</label>
            
            <select name="car_condition" required>
            
            <option value="">Select Condition</option>
            
            {% for condition in conditions %}
            <option value="{{ condition }}">{{ condition }}</option>
            {% endfor %}
            
            </select>
            
            </div>
            <div class="input-box">

                <label>Insurance Status</label>
                
                <select name="insurance_status" required>
                
                <option value="">Select Status</option>
                
                {% for item in insurance_status %}
                <option value="{{ item }}">{{ item }}</option>
                {% endfor %}
                
                </select>
                
                </div>
                <div class="input-box">

                    <label>Accident History</label>
                    
                    <select name="accident_history" required>
                    
                    <option value="">Select</option>
                    
                    {% for item in accident_history %}
                    <option value="{{ item }}">{{ item }}</option>
                    {% endfor %}
                    
                    </select>
                    
                    </div>
                    <div class="input-box">

                        <label>City</label>
                        
                        <select name="city" required>
                        
                        <option value="">Select City</option>
                        
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                        
                        </select>
                        
                        </div>
<div class="input-box">

<label>KM Driven</label>

<input
type="number"
name="km_driven"
required>

</div>
<div class="input-box">
    <label>Mileage (km/l)</label>

    <input
        type="number"
        step="0.1"
        name="mileage"
        placeholder="e.g. 18.5"
        required>
</div>

<div class="input-box">

<label>Engine (CC)</label>

<input
type="number"
name="engine"
required>

</div>

<div class="input-box">

<label>Max Power (BHP)</label>

<input
type="number"
step="0.1"
name="max_power"
required>

</div>
<div class="input-box">
    <label>Seats</label>

    <input
        type="number"
        name="seats"
        placeholder="e.g. 5"
        required>
</div>

<button class="predict-btn">

<i class="fa-solid fa-magnifying-glass"></i>

Predict Price

</button>

</form>

{% if prediction %}

<div class="result">

<h2>Estimated Price</h2>

<h1>₹ {{ prediction }}</h1>

</div>

{% endif %}

</div>

</div>

<footer>

Developed by <b>Mohammed Saad Sayyed</b><br>

B.Tech CSE | Machine Learning Project

</footer>
<script>
    window.brandModel = {{ brand_model|safe }};

    window.brandModelDetails = {{ brand_model_details|safe }};
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
